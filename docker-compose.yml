services:
  # Primary attack/security utilities container
  secutils:
    image: ghcr.io/michael-borck/secutils:latest
    container_name: secutils
    hostname: secutils
    networks:
      cyb204_net:
        ipv4_address: 172.20.0.10
    stdin_open: true
    tty: true
    volumes:
      - ./shared:/shared

  # Linux workstation target
  workstation:
    image: ghcr.io/michael-borck/workstation:latest
    container_name: workstation
    hostname: workstation
    networks:
      cyb204_net:
        ipv4_address: 172.20.0.20
    stdin_open: true
    tty: true

  # Ubuntu desktop environment (lightweight)
  ubuntu-desktop:
    image: ghcr.io/michael-borck/ubuntu-desktop:latest
    container_name: ubuntu-desktop
    hostname: ubuntu-desktop
    networks:
      cyb204_net:
        ipv4_address: 172.20.0.30
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=:0

  # LDAP service
  ldap:
    image: osixia/openldap:latest
    container_name: ldap
    hostname: ldap
    networks:
      cyb204_net:
        ipv4_address: 172.20.0.40
    environment:
      - LDAP_ORGANISATION=CYB204
      - LDAP_DOMAIN=cyb204.local
      - LDAP_ADMIN_PASSWORD=admin123

  # MySQL database
  mysql:
    image: mysql:8.0
    container_name: mysql
    hostname: mysql
    networks:
      cyb204_net:
        ipv4_address: 172.20.0.50
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=dbuser
      - MYSQL_PASSWORD=dbpass123

  # Telnet service
  telnet:
    image: ghcr.io/michael-borck/telnet:latest
    container_name: telnet
    hostname: telnet
    networks:
      cyb204_net:
        ipv4_address: 172.20.0.60
    stdin_open: true
    tty: true

  # OWASP Juice Shop (vulnerable web app)
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop
    hostname: juice-shop
    networks:
      cyb204_net:
        ipv4_address: 172.20.0.70
    ports:
      - "3000:3000"

  # DVWA (Damn Vulnerable Web Application)
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: dvwa
    hostname: dvwa
    networks:
      cyb204_net:
        ipv4_address: 172.20.0.80
    ports:
      - "8080:80"

networks:
  cyb204_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
