# Lateral Movement Lab — two-segment network.
#
# The attacker box (secutils) lives on the "corp" segment together with the
# workstation and the public-facing web apps. The sensitive services — LDAP,
# MySQL, telnet and a second workstation — live on the "internal" segment,
# which secutils CANNOT reach directly.
#
# The workstation is dual-homed (it sits on BOTH segments), so it is the pivot:
# compromise it, then tunnel through it (ssh -D / proxychains) to reach the
# internal services. That is the whole point of the lab.
#
#   corp     172.20.1.0/24   secutils .10 · workstation .20 · juice-shop .70 · dvwa .80
#   internal 172.20.2.0/24   workstation .20 · ubuntu-desktop .30 · ldap .40 · mysql .50 · telnet .60

services:
  # Attacker box — your tools. On the corp segment ONLY.
  secutils:
    image: ghcr.io/michael-borck/latmove-secutils:latest
    container_name: secutils
    hostname: secutils
    networks:
      corp:
        ipv4_address: 172.20.1.10
    stdin_open: true
    tty: true
    volumes:
      - ./shared:/shared

  # The foothold host and the pivot — dual-homed on corp AND internal.
  workstation:
    image: ghcr.io/michael-borck/latmove-workstation:latest
    container_name: workstation
    hostname: workstation
    networks:
      corp:
        ipv4_address: 172.20.1.20
      internal:
        ipv4_address: 172.20.2.20
    stdin_open: true
    tty: true

  # A second workstation, reachable only from inside. Internal segment.
  ubuntu-desktop:
    image: ghcr.io/michael-borck/latmove-ubuntu-desktop:latest
    container_name: ubuntu-desktop
    hostname: ubuntu-desktop
    networks:
      internal:
        ipv4_address: 172.20.2.30
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=:0

  # LDAP directory — internal only.
  ldap:
    image: osixia/openldap:latest
    container_name: ldap
    hostname: ldap
    networks:
      internal:
        ipv4_address: 172.20.2.40
    environment:
      - LDAP_ORGANISATION=Northwind
      - LDAP_DOMAIN=corp.local
      - LDAP_ADMIN_PASSWORD=admin123

  # MySQL database — internal only.
  mysql:
    image: mysql:8.0
    container_name: mysql
    hostname: mysql
    networks:
      internal:
        ipv4_address: 172.20.2.50
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=dbuser
      - MYSQL_PASSWORD=dbpass123

  # Legacy telnet service — internal only.
  telnet:
    image: ghcr.io/michael-borck/latmove-telnet:latest
    container_name: telnet
    hostname: telnet
    networks:
      internal:
        ipv4_address: 172.20.2.60
    stdin_open: true
    tty: true

  # OWASP Juice Shop — a public-facing web app on the corp segment.
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop
    hostname: juice-shop
    networks:
      corp:
        ipv4_address: 172.20.1.70
    ports:
      - "3000:3000"

  # DVWA — a public-facing web app on the corp segment.
  dvwa:
    image: ghcr.io/digininja/dvwa:latest  # multi-arch (amd64+arm64); needs the dvwa-db service below
    container_name: dvwa
    hostname: dvwa
    environment:
      - DB_SERVER=dvwa-db
    depends_on:
      - dvwa-db
    networks:
      corp:
        ipv4_address: 172.20.1.80
    ports:
      - "8080:80" # browse http://localhost:8080 then /setup.php -> Create / Reset Database

  # DVWA's database backend (on corp with the app it serves).
  dvwa-db:
    image: mariadb:10
    container_name: dvwa-db
    hostname: dvwa-db
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd
    networks:
      corp:
        ipv4_address: 172.20.1.85

networks:
  corp:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.2.0/24
