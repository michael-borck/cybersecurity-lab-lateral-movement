name: Build and publish lab images

# Builds the four custom lab images for both amd64 and arm64 (so Apple Silicon
# Macs get native images) and pushes them to GitHub Container Registry (GHCR).
# Students then just `docker compose up -d` and the right architecture is pulled
# automatically.

on:
  push:
    branches: [main]
    paths:
      - 'secutils/**'
      - 'workstation/**'
      - 'ubuntu-desktop/**'
      - 'telnet/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: secutils
            context: ./secutils
          - name: workstation
            context: ./workstation
          - name: ubuntu-desktop
            context: ./ubuntu-desktop
          - name: telnet
            context: ./telnet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
